#  Tag and push to publish:
#   - git tag v0.1.1
#   - git push origin v0.1.1
# Workflow runs:
#   - CI job: Runs lint, typecheck, and tests on every push to main
#   - Publish job: Runs only when you push a tag (e.g., v0.1.1)

name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pyright
        run: uv run pyright

      - name: Run Pytest
        run: uv run pytest

  publish:
    name: Publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install build and twine
        run: uv pip install build twine

      - name: Build package
        run: rm -rf dist/ build/ && uv run python -m build

      - name: Upload to PyPI
        run: twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
